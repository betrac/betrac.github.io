<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeTraC — Beyond Transcription Challenge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .card {
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 3rem 3.5rem;
      max-width: 480px;
      width: 90%;
    }

    .acronym {
      font-size: 2.8rem;
      font-weight: bold;
      color: #1a2744;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .full-name {
      font-size: 1.05rem;
      color: #4a5568;
      margin-top: 0.4rem;
      font-style: italic;
    }

    .venue {
      font-size: 0.95rem;
      color: #718096;
      margin-top: 0.6rem;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-style: normal;
    }

    hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 1.8rem 0;
    }

    p {
      font-size: 0.98rem;
      color: #4a5568;
      line-height: 1.65;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    p + p {
      margin-top: 0.75rem;
    }

    .contact {
      margin-top: 1.4rem;
      font-size: 0.88rem;
      color: #a0aec0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="acronym">BeTraC</div>
    <div class="full-name">Beyond Transcription Challenge</div>
    <div class="venue">IEEE SLT 2026</div>

    <hr>

    <p>Website coming soon.</p>
    <p>In the meantime, see our challenge proposal for details.</p>

    <p class="contact">Contact: organizers — details TBD</p>
  </div>
</body>
</html>
